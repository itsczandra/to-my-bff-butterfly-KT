<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To My Kambal Tuko</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<section class="hero">

    <div class="content">

        <h1>🦋</h1>

        <h2>To My Kambal Tuko</h2>

        <p>
            A letter you'll always have,
            wherever life takes you.
        </p>

        <button onclick="showLetter()">
    Open My Letter ❤️
</button>

    </div>

</section>
    <section class="letter" id="letter">

    <div class="letter-box">

        <h2>Hi, Butterfly. 🦋</h2>

        <p>

            If you're reading this...

            it means you opened the little box I gave you.

        </p>

        <p>

            Before anything else,

            thank you...

            for staying by my side

            for more than twenty years.

        </p>

        <p>

            (Our real letter will go here later ❤️)

        </p>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
